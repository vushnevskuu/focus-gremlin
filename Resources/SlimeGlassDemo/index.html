<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slime on glass — Three.js prototype</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0c; }
    canvas { display: block; width: 100%; height: 100%; }
    #hint {
      position: fixed; bottom: 8px; left: 8px; font: 11px/1.4 system-ui, sans-serif;
      color: #666; pointer-events: none; max-width: 420px;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <p id="hint">Локально: <code>cd SlimeGlassDemo && python3 -m http.server 8765</code> → http://localhost:8765 (ESM + Three с CDN).</p>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
